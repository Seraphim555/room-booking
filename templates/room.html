<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аудитория {{ room_id }}</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="top-panel">
        <h1 style="color: #000000;">Аудитория {{ room_id }}</h1>

        <div style="color: #000000;" class="datetime">
            <div id="date"></div>
            <div id="time"></div>
        </div>
    </div>

    <div id="status-card" class="status-card free">
        <h2 id="status-text">Свободна</h2>
    </div>

    <div class="slots">
        {% for slot in slots %}
        <div class="slot" id="slot-{{ slot }}">
            <div class="slot-time">{{ slot }}</div>
            <div class="slot-status">Свободно</div>
        </div>
        {% endfor %}
    </div>

</div>

<script>
    const ROOM_ID = "{{ room_id }}";
</script>

<script src="/static/script.js"></script>

</body>
</html>
